<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tallo CPA – BIR Setup</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { overflow: auto; height: auto; }
    #app-header { position: sticky; top: 0; z-index: 100; }
    #setup-wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
  </style>
</head>
<body>

  <header id="app-header">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <rect width="26" height="26" rx="6" fill="#c0392b"/>
        <text x="13" y="18" text-anchor="middle" font-size="13" font-weight="700" fill="white" font-family="sans-serif">₱</text>
      </svg>
      Tallo CPA
      <span class="badge">BIR SETUP</span>
    </div>
    <div id="business-bar">
      <label for="business-select">Business</label>
      <select id="business-select"><option value="">Loading…</option></select>
    </div>
  </header>

  <div id="setup-wrap">
    <div id="setup-content">
      <div class="spinner-wrap"><div class="spinner"></div><span>Connecting to Manager.io…</span></div>
    </div>
  </div>

  <!-- Extension UUID: 7a3f9e2d-5b8c-4e1a-9d6f-2c4a7b8e3f1d  DO NOT CHANGE -->
  <script src="atc-codes.js"></script>
  <script src="shared.js"></script>
  <script src="setup.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await loadBusinesses('business-select', () => {
        renderSetup(document.getElementById('setup-content'));
      });
    });
  </script>
</body>
</html>
